[terminal]
shell = "fish"

[general]
import = [
    "~/.config/alacritty/theme.toml"
]
[font]
size = 10.0

[font.normal]
family = "Lilex Nerd Font"
style = "Regular"

[font.italic]
family = "Lilex Nerd Font"
style = "Italic"

[font.bold]
family = "Lilex Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Lilex Nerd Font"
style = "Bold Italic"

[window]
padding = { x = 5, y = 5}
